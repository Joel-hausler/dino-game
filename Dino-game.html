<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dino Game</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
      }

      #score {
        text-align: center;
        font-family: Arial, sans-serif;
        margin: 12px 0;
        font-size: 32px;
      }

      #game {
        width: 600px;
        height: 300px;
        border: 2px solid black;
        margin: 20px auto;
        background-image: url("https://raw.githubusercontent.com/Joel-hausler/dino-game/main/Hintergrund%20Stadion.png");
        background-size: cover;
        background-position: center;
        overflow: hidden;
        position: relative;
        user-select: none;
        background-color: white;
      }

      /* Spieler */
      #player {
        height: 75px;
        width: 75px;
        top: 225px;
        left: 40px;
        position: absolute;
        background-image: url("https://raw.githubusercontent.com/Joel-hausler/dino-game/main/Vin%C3%ADcius%20J%C3%BAnior%20-%20FootyRenders.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      /* Hindernis */
      #rock {
        width: 50px;
        height: 50px;
        position: absolute;
        top: 250px;
        left: 550px;
        background-image: url("https://raw.githubusercontent.com/Joel-hausler/dino-game/main/FC_Barcelona_(crest).svg.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        animation: none;
      }

      @keyframes rock {
        0% {
          left: 550px;
        }
        100% {
          left: -50px;
        }
      }

      #controls {
        margin-top: 10px;
        font-size: 15px;
        line-height: 1.5;
      }

      #startButton {
        padding: 10px 20px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        border: 2px solid black;
        background: white;
        margin-top: 10px;
      }

      #message {
        margin-top: 10px;
        font-weight: bold;
        min-height: 24px;
      }
    </style>
  </head>
  <body>
    <h1 id="score">0</h1>

    <div id="game">
      <div id="player"></div>
      <div id="rock"></div>
    </div>

    <button id="startButton">Start</button>

    <div id="controls">
      Pfeil nach oben = Springen<br />
      Klick ins Spielfeld = Springen
    </div>

    <div id="message">Drücke auf Start, um das Spiel zu beginnen.</div>

    <script>
      const player = document.getElementById("player");
      const rock = document.getElementById("rock");
      const score = document.getElementById("score");
      const startButton = document.getElementById("startButton");
      const message = document.getElementById("message");
      const game = document.getElementById("game");

      let points = 0;
      let isRunning = false;
      let isGameOver = false;

      // Physikalische Sprungwerte
      let playerY = 225;
      let velocityY = 0;
      let isJumping = false;

      const groundY = 225;
      const gravity = 0.9;
      const jumpForce = -14;

      score.innerText = 0;
      player.style.top = groundY + "px";

      setInterval(() => {
        if (!isRunning || isGameOver) return;

        // Score
        points += 1;
        score.innerText = points;

        // ------------------------------
        // Verbessertes Springverhalten:
        // Der Sprung läuft jetzt mit Geschwindigkeit und Schwerkraft.
        // Dadurch ist die Airtime physikalischer:
        // nach oben wird die Figur langsamer, nach unten wieder schneller.
        // ------------------------------
        if (isJumping) {
          velocityY += gravity;
          playerY += velocityY;

          if (playerY >= groundY) {
            playerY = groundY;
            velocityY = 0;
            isJumping = false;
          }

          player.style.top = playerY + "px";
        }

        // Kollision
        const rockLeft = parseInt(
          window.getComputedStyle(rock).getPropertyValue("left"),
          10
        );

        if (rockLeft < 110 && rockLeft > 20 && playerY > 180) {
          endGame();
        }
      }, 20);

      function startGame() {
        isRunning = true;
        isGameOver = false;

        points = 0;
        score.innerText = 0;

        playerY = groundY;
        velocityY = 0;
        isJumping = false;
        player.style.top = groundY + "px";

        message.innerText = "Spiel läuft!";
        startButton.innerText = "Restart";

        rock.style.animation = "none";
        rock.style.left = "550px";
        rock.offsetHeight;
        rock.style.animation = "rock 1.33s infinite linear";
      }

      function endGame() {
        isRunning = false;
        isGameOver = true;

        rock.style.animation = "none";
        message.innerText = "Game Over! Klicke auf Restart.";
      }

      function jump() {
        if (!isRunning || isGameOver) return;
        if (isJumping) return;

        isJumping = true;
        velocityY = jumpForce;
      }

      startButton.addEventListener("click", () => {
        console.log("Start Button wurde geklickt");
        startGame();
      });

      document.addEventListener("keydown", (event) => {
        if (event.code === "ArrowUp") {
          event.preventDefault();
          jump();
        }
      });

      game.addEventListener("click", () => {
        jump();
      });
    </script>
  </body>
</html>
